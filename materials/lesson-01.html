<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0eb">
<title>오답 단어장 - 이태형</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb; --card: #ffffff; --accent: #2d5be3; --accent2: #e3502d;
    --wrong-col: #d94040; --blank-col: #d97a20;
    --text: #1a1a2e; --text2: #6b6b80; --muted: #b0aab8; --border: #e2dcd8;
    --tip-bg: #eef3ff; --ex-bg: #faf8f5; --green: #1a9e6f;
    --pill-wrong: #fff0f0; --pill-blank: #fff5e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; background: var(--bg); font-family: 'Gowun Dodum', sans-serif; color: var(--text); overflow: hidden; -webkit-text-size-adjust: 100%; overscroll-behavior: none; touch-action: pan-y; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
  .header { flex-shrink: 0; padding: 12px 16px 8px; display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
  .header-left { min-width: 0; flex: 1; }
  .header-left .name { font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); }
  .header-left .title { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--text); margin-top: 2px; letter-spacing: -0.5px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .index-display { font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .index-display span { color: var(--muted); font-weight: 400; }
  .prog-wrap { flex-shrink: 0; padding: 0 16px 10px; }
  .prog-dots { display: flex; justify-content: space-between; gap: 3px; }
  .pdot { flex: 1; height: 4px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
  .pdot.done { background: var(--accent); } .pdot.current { background: var(--accent); opacity: 0.4; } .pdot.done.all { background: var(--green); }
  .card-viewport { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 0; touch-action: pan-y; user-select: none; -webkit-user-select: none; }
  .flash-card { position: absolute; width: calc(100% - 24px); max-width: 430px; height: calc(100% - 10px); max-height: 620px; will-change: transform, opacity; cursor: pointer; touch-action: pan-y; transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s; }
  .flash-card.no-transition { transition: none !important; } .flash-card.dragging { transition: none !important; }
  .card-face { width: 100%; height: 100%; background: var(--card); border-radius: 22px; border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(45,91,227,0.08), 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
  .card-line { height: 4px; flex-shrink: 0; border-radius: 22px 22px 0 0; }
  .line-wrong { background: linear-gradient(90deg, var(--wrong-col) 0%, #ff9980 100%); }
  .line-blank { background: linear-gradient(90deg, var(--blank-col) 0%, #ffd080 100%); }
  .card-content { flex: 1; padding: 16px 18px 12px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .face-meaning, .face-word { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .scroll-area { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; touch-action: pan-y; overscroll-behavior: contain; scrollbar-width: thin; }
  .scroll-area::-webkit-scrollbar { width: 3px; } .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; flex-shrink: 0; }
  .badge { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; }
  .b-num { background: var(--border); color: var(--text2); }
  .b-wrong { background: var(--pill-wrong); color: var(--wrong-col); border: 1px solid #ffcccc; }
  .b-blank { background: var(--pill-blank); color: var(--blank-col); border: 1px solid #ffddb0; }
  .b-pos { background: #f0f0ff; color: var(--accent); border: 1px solid #d0d8ff; }
  .b-src1 { background: #f0fff8; color: #1a9e6f; border: 1px solid #b0e8cc; }
  .b-src2 { background: #f5f0ff; color: #6a3fb5; border: 1px solid #d0b8ff; }
  .meaning-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 8px; padding: 10px 0; min-height: 120px; }
  .meaning-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .meaning-text { font-size: 1.85rem; font-weight: 400; color: var(--text); line-height: 1.3; letter-spacing: -0.5px; }
  .word-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 6px; padding: 10px 0; min-height: 120px; }
  .word-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .word-text { font-family: 'Space Grotesk', sans-serif; font-size: 2.4rem; font-weight: 700; color: var(--text); letter-spacing: -1px; line-height: 1.1; word-break: break-word; }
  .word-pos { font-size: 0.76rem; color: var(--text2); margin-top: 2px; }
  .student-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 8px 12px; background: var(--pill-wrong); border-radius: 10px; border: 1px solid #ffcccc; flex-shrink: 0; }
  .student-row.is-blank { background: var(--pill-blank); border-color: #ffddb0; }
  .student-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--wrong-col); flex-shrink: 0; }
  .student-row.is-blank .student-label { color: var(--blank-col); }
  .student-ans { font-size: 0.82rem; color: var(--wrong-col); text-decoration: line-through; text-decoration-color: rgba(217,64,64,0.5); }
  .blank-ans { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .tip-box { background: var(--tip-bg); border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0; padding: 9px 13px; font-size: 0.74rem; color: #3a5ab0; line-height: 1.6; margin-top: 10px; flex-shrink: 0; }
  .tip-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
  .example-box { background: var(--ex-bg); border: 1px solid var(--border); border-radius: 12px; padding: 9px 13px; font-size: 0.72rem; color: var(--text2); line-height: 1.65; font-style: italic; margin-top: 7px; flex-shrink: 0; }
  .example-box em { color: var(--accent2); font-style: normal; font-weight: 600; }
  .tap-hint { text-align: center; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.5px; padding-top: 8px; padding-bottom: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .tap-hint::before, .tap-hint::after { content: ''; display: inline-block; width: 18px; height: 1px; background: var(--border); }
  .nav-hint { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 10px; }
  .nav-item { display: flex; align-items: center; gap: 5px; font-size: 0.63rem; color: var(--muted); }
  .nav-arrow { font-size: 0.95rem; color: var(--border); }
  .nav-center { font-size: 0.63rem; color: var(--muted); }
  .swipe-indicator { position: absolute; font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; border-radius: 10px; opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.1s; }
  .ind-prev { top: 50%; transform: translateY(-50%); left: 16px; color: var(--accent); background: rgba(45,91,227,0.08); border: 1.5px solid rgba(45,91,227,0.2); }
  .ind-next { top: 50%; transform: translateY(-50%); right: 16px; color: var(--text2); background: rgba(0,0,0,0.05); border: 1.5px solid var(--border); }
  .ind-up { top: 16px !important; left: 50% !important; transform: translateX(-50%) !important; color: var(--green); background: rgba(26,158,111,0.08); border: 1.5px solid rgba(26,158,111,0.2); }
  .ind-down { bottom: 16px !important; left: 50% !important; transform: translateX(-50%) !important; color: var(--text2); background: rgba(0,0,0,0.05); border: 1.5px solid var(--border); }
  .random-btn { font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 700; padding: 8px 13px; border-radius: 18px; border: 1.5px solid var(--accent2); background: transparent; color: var(--accent2); cursor: pointer; transition: all 0.2s; min-height: 36px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; display: inline-flex; align-items: center; gap: 4px; }
  .random-btn:active { transform: scale(0.93); } .random-btn.shuffled { background: var(--accent2); color: #fff; }
  .mode-chip { display: inline-flex; align-items: center; gap: 2px; background: var(--border); border-radius: 22px; padding: 3px; }
  .mode-btn { font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 600; padding: 8px 12px; border-radius: 18px; border: none; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.2s; min-height: 36px; min-width: 60px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .mode-btn.active { background: var(--card); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .end-card { position: absolute; width: calc(100% - 24px); max-width: 430px; height: calc(100% - 10px); max-height: 620px; will-change: transform, opacity; touch-action: pan-y; transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s; }
  .end-card.no-transition { transition: none !important; }
  .end-face { width: 100%; height: 100%; background: var(--card); border-radius: 22px; border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(45,91,227,0.08), 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
  .end-line { height: 4px; flex-shrink: 0; border-radius: 22px 22px 0 0; background: linear-gradient(90deg, var(--accent) 0%, #6a8eff 50%, var(--green) 100%); }
  .end-content { flex: 1; padding: 24px 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 18px; overflow: hidden; touch-action: pan-y; }
  .end-emoji { font-size: 3.4rem; line-height: 1; animation: pop 0.6s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes pop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.15);opacity:1} 100%{transform:scale(1);opacity:1} }
  .end-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .end-title { font-size: 1.55rem; font-weight: 400; color: var(--text); line-height: 1.35; letter-spacing: -0.5px; margin-top: -6px; }
  .end-subtitle { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }
  .restart-btn { margin-top: 6px; background: var(--accent); color: #fff; border: none; border-radius: 16px; padding: 14px 32px; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 16px rgba(45,91,227,0.25); transition: transform 0.15s; -webkit-tap-highlight-color: transparent; touch-action: pan-y; min-height: 48px; display: inline-flex; align-items: center; gap: 8px; }
  .restart-btn:active { transform: scale(0.96); }
  .end-hint { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
  @media (max-height:700px) { .meaning-text{font-size:1.6rem} .word-text{font-size:2.1rem} .meaning-center,.word-center{min-height:100px;padding:6px 0} .end-emoji{font-size:2.8rem} .end-title{font-size:1.35rem} .end-content{gap:14px;padding:18px 20px} }
  @media (max-height:600px) { .header{padding:8px 16px 6px} .meaning-text{font-size:1.4rem} .word-text{font-size:1.85rem} .nav-hint{padding:6px 20px 8px} }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="name">바로그영어 · 이태형</div>
      <div class="title">오답 단어장</div>
    </div>
    <div class="header-right">
      <div class="index-display"><span id="cur">1</span> <span>/ <span id="tot">-</span></span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="random-btn" id="btn-random" type="button">🔀 랜덤</button>
        <div class="mode-chip">
          <button class="mode-btn active" id="btn-word" type="button">단어→뜻</button>
          <button class="mode-btn" id="btn-meaning" type="button">뜻→단어</button>
        </div>
      </div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-dots" id="prog-dots"></div></div>
  <div class="card-viewport" id="viewport">
    <div class="swipe-indicator ind-prev" id="ind-prev">← 이전</div>
    <div class="swipe-indicator ind-next" id="ind-next">다음 →</div>
    <div class="swipe-indicator ind-up" id="ind-up">↑ 뒤집기</div>
    <div class="swipe-indicator ind-down" id="ind-down">↓ 뒤집기</div>
  </div>
  <div class="nav-hint">
    <div class="nav-item"><span class="nav-arrow">→</span> 이전 단어</div>
    <div class="nav-center">탭·위아래스와이프 = 뒤집기</div>
    <div class="nav-item">다음 단어 <span class="nav-arrow">←</span></div>
  </div>
</div>
<script>
// src: 'A'=Day20~29, 'B'=Day01/Day30
const cards = [
  // ── Day 20~29 오답 & 미기재 ──
  { num:2, word:'assemble', pos:'동사', type:'wrong', src:'A',
    correct:'조립하다, 모이다', student:'닮은',
    tip:'assemble = 부품을 모아 만들다 / assembly line = 조립 라인',
    example:'They <em>assembled</em> the furniture.' },

  { num:4, word:'guarantee', pos:'동사/명사', type:'wrong', src:'A',
    correct:'보장하다, 보증', student:'확장하다',
    tip:'guarantee = 확실히 약속하다 / expand = 확장하다',
    example:'I <em>guarantee</em> your satisfaction.' },

  { num:5, word:'utilize', pos:'동사', type:'wrong', src:'A',
    correct:'활용하다, 이용하다', student:'도시',
    tip:'utilize = use(사용하다)의 격식체 / utility = 유용성',
    example:'We should <em>utilize</em> our resources wisely.' },

  { num:8, word:'role', pos:'명사', type:'wrong', src:'A',
    correct:'역할', student:'규칙',
    tip:'role = 맡은 역할 / rule = 규칙 (혼동 주의!)',
    example:'She played a key <em>role</em> in the project.' },

  { num:21, word:'acknowledge', pos:'동사', type:'wrong', src:'A',
    correct:'인정하다, 인식하다', student:'잘못된 자식',
    tip:'acknowledge = 사실로 받아들이다',
    example:'He <em>acknowledged</em> his mistake.' },

  { num:23, word:'precede', pos:'동사', type:'wrong', src:'A',
    correct:'앞서다, 선행하다', student:'10년이',
    tip:'pre(앞에) + cede(가다) → 앞에 가다 / decade = 10년',
    example:'The introduction <em>precedes</em> the main text.' },

  { num:25, word:'policy', pos:'명사', type:'wrong', src:'A',
    correct:'정책', student:'전략',
    tip:'policy = 공식 정책 / strategy = 전략 (혼동 주의!)',
    example:'The government changed its health <em>policy</em>.' },

  { num:28, word:'absence', pos:'명사', type:'blank', src:'A',
    correct:'부재, 결석', student:'',
    tip:'absent(결석한) → absence / presence ↔ absence',
    example:'His <em>absence</em> was noticed by everyone.' },

  { num:31, word:'valley', pos:'명사', type:'wrong', src:'A',
    correct:'계곡, 골짜기', student:'골목',
    tip:'valley = 산 사이의 계곡 / alley = 골목',
    example:'The river flows through the <em>valley</em>.' },

  { num:32, word:'general', pos:'형용사/명사', type:'wrong', src:'A',
    correct:'일반적인, 장군', student:'관대하는',
    tip:'general(일반적인) ≠ generous(관대한) 혼동 주의!',
    example:'In <em>general</em>, people prefer warm weather.' },

  { num:33, word:'estimate', pos:'동사/명사', type:'wrong', src:'A',
    correct:'추정하다, 추정', student:'측전이다',
    tip:'estimate = 대략 계산하다 / estimation = 추정치',
    example:'We <em>estimated</em> the cost at $500.' },

  { num:38, word:'generate', pos:'동사', type:'wrong', src:'A',
    correct:'발생시키다, 만들다', student:'세대',
    tip:'generate(발생시키다) ≠ generation(세대) 형태 주의!',
    example:'Solar panels <em>generate</em> electricity.' },

  { num:41, word:'interest', pos:'명사', type:'wrong', src:'A',
    correct:'관심, 흥미', student:'관심있는',
    tip:'interest(명사: 관심) / interesting(형용사: 흥미로운)',
    example:'She showed great <em>interest</em> in art.' },

  { num:43, word:'diameter', pos:'명사', type:'blank', src:'A',
    correct:'지름, 직경', student:'',
    tip:'dia(가로질러) + meter(측정) → 원을 가로지르는 길이',
    example:'The <em>diameter</em> of the circle is 10cm.' },

  { num:46, word:'collapse', pos:'동사/명사', type:'blank', src:'A',
    correct:'붕괴하다, 무너지다', student:'',
    tip:'col(함께) + lapse(떨어지다) → 함께 무너지다',
    example:'The building <em>collapsed</em> in the earthquake.' },

  { num:48, word:'destroy', pos:'동사', type:'wrong', src:'A',
    correct:'파괴하다', student:'망하다',
    tip:'destroy = 완전히 부수다 / destruction = 파괴',
    example:'The fire <em>destroyed</em> the forest.' },

  { num:50, word:'confront', pos:'동사', type:'blank', src:'A',
    correct:'맞서다, 직면하다', student:'',
    tip:'con(함께) + front(앞) → 정면으로 맞서다',
    example:'We must <em>confront</em> the problem.' },

  // ── Day 01/30 오답 & 미기재 ──
  { num:10, word:'tender', pos:'형용사', type:'wrong', src:'B',
    correct:'부드러운, 다정한', student:'손상한',
    tip:'tender = 연하고 부드러운 / tough = 질긴',
    example:'The meat was very <em>tender</em>.' },

  { num:13, word:'quite', pos:'부사', type:'wrong', src:'B',
    correct:'꽤, 상당히', student:'조용한',
    tip:'quite(꽤) ≠ quiet(조용한) 철자 혼동 주의!',
    example:'It was <em>quite</em> cold yesterday.' },

  { num:23, word:'instantly', pos:'부사', type:'wrong', src:'B',
    correct:'즉시, 즉각', student:'끊임없이',
    tip:'instantly = at once(즉시) / continuously = 끊임없이',
    example:'She <em>instantly</em> recognized him.' },

  { num:24, word:'pot', pos:'명사', type:'wrong', src:'B',
    correct:'냄비, 솥', student:'국자사',
    tip:'pot = 요리용 냄비 / ladle = 국자',
    example:'She boiled water in a <em>pot</em>.' },

  { num:25, word:'palm', pos:'명사', type:'blank', src:'B',
    correct:'손바닥, 야자나무', student:'',
    tip:'palm of hand = 손바닥 / palm tree = 야자나무',
    example:'She held the coin in her <em>palm</em>.' },

  { num:30, word:'clarify', pos:'동사', type:'wrong', src:'B',
    correct:'명확히 하다', student:'명백한',
    tip:'clarify(동사: 명확히 하다) ≠ clear(형용사: 명백한)',
    example:'Can you <em>clarify</em> what you mean?' },

  { num:44, word:'exclude', pos:'동사', type:'wrong', src:'B',
    correct:'제외하다', student:'제거하다',
    tip:'exclude(제외하다) ≠ remove(제거하다) / include ↔ exclude',
    example:'Taxes are <em>excluded</em> from the price.' },
];

let idx=0, startFace='word', showingBack=false, isAnimating=false;

function setStartFace(mode) {
  if(isAnimating)return; startFace=mode; showingBack=false;
  document.getElementById('btn-meaning').classList.toggle('active',mode==='meaning');
  document.getElementById('btn-word').classList.toggle('active',mode==='word');
  if(idx>=cards.length)return; renderCard(0);
}
document.getElementById('btn-meaning').addEventListener('click',()=>setStartFace('meaning'));
document.getElementById('btn-word').addEventListener('click',()=>setStartFace('word'));

const originalCards=[...cards]; let isShuffled=false;
function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
document.getElementById('btn-random').addEventListener('click',function(){
  if(isAnimating)return; haptic(20);
  if(!isShuffled){const s=shuffleArray(cards);cards.length=0;s.forEach(c=>cards.push(c));isShuffled=true;this.classList.add('shuffled');this.textContent='🔀 랜덤ON';}
  else{cards.length=0;originalCards.forEach(c=>cards.push(c));isShuffled=false;this.classList.remove('shuffled');this.textContent='🔀 랜덤';}
  idx=0;showingBack=false;buildDots();renderCard(0);
});

function buildDots(){const wrap=document.getElementById('prog-dots');wrap.innerHTML='';cards.forEach((_,i)=>{const d=document.createElement('div');d.className='pdot';d.id=`dot-${i}`;wrap.appendChild(d);});updateDots();}
function updateDots(){const isEnd=idx>=cards.length;cards.forEach((_,i)=>{const d=document.getElementById(`dot-${i}`);if(!d)return;d.className='pdot'+(isEnd?' done all':i<idx?' done':i===idx?' current':'');});document.getElementById('cur').textContent=isEnd?'✓':(idx+1);document.getElementById('tot').textContent=cards.length;}

function buildCardHTML(card){
  const srcClass=card.src==='A'?'b-src1':'b-src2';
  const srcLabel=card.src==='A'?'Day 20~29':'Day 01/30';
  const isBlank=card.type==='blank';
  const badgeType=isBlank?`<span class="badge b-blank">미기재</span>`:`<span class="badge b-wrong">오답</span>`;
  const studentHTML=isBlank?`<div class="student-row is-blank"><span class="student-label">내 답</span><span class="blank-ans">미기재</span></div>`:`<div class="student-row"><span class="student-label">내 답</span><span class="student-ans">${card.student}</span></div>`;
  const badgesHTML=`<div class="badges"><span class="badge b-num">No.${card.num}</span>${badgeType}<span class="badge b-pos">${card.pos}</span><span class="badge ${srcClass}">${srcLabel}</span></div>`;
  const WORD_FACE=`<div class="face-word">${badgesHTML}<div class="word-center"><div class="word-label">영단어</div><div class="word-text">${card.word}</div><div class="word-pos">${card.pos}</div></div><div class="tap-hint">탭해서 뜻 보기</div></div>`;
  const WORD_BACK=`<div class="face-word">${badgesHTML}<div class="scroll-area"><div class="word-center" style="min-height:80px"><div class="word-label">영단어</div><div class="word-text" style="font-size:1.7rem">${card.word}</div></div><div class="meaning-label" style="text-align:center;margin-bottom:6px">뜻</div><div class="meaning-text" style="text-align:center;font-size:1.4rem;margin-bottom:10px">${card.correct}</div>${studentHTML}<div class="tip-box"><div class="tip-title">💡 암기 팁</div>${card.tip}</div><div class="example-box">${card.example}</div></div><div class="tap-hint">탭해서 영단어 보기</div></div>`;
  const MEANING_FACE=`<div class="face-meaning">${badgesHTML}<div class="meaning-center"><div class="meaning-label">뜻</div><div class="meaning-text">${card.correct}</div></div><div class="tap-hint">탭해서 영단어 보기</div></div>`;
  const MEANING_BACK=`<div class="face-meaning">${badgesHTML}<div class="scroll-area"><div class="word-center" style="min-height:100px"><div class="word-label">영단어</div><div class="word-text">${card.word}</div><div class="word-pos">${card.pos}</div></div>${studentHTML}<div class="tip-box"><div class="tip-title">💡 암기 팁</div>${card.tip}</div><div class="example-box">${card.example}</div></div><div class="tap-hint">탭해서 뜻 보기</div></div>`;
  return{frontHTML:startFace==='meaning'?MEANING_FACE:WORD_FACE,backHTML:startFace==='meaning'?MEANING_BACK:WORD_BACK};
}

function buildEndHTML(){return`<div class="end-face"><div class="end-line"></div><div class="end-content"><div class="end-emoji">🎉</div><div><div class="end-label">All Done</div><div class="end-title">학습을 모두 마쳤어요!</div></div><div class="end-subtitle">오답 단어 ${cards.length}개를 모두 복습했어요.<br>한 번 더 반복하면 더욱 확실해져요 ✨</div><button class="restart-btn" id="restart-btn" type="button"><span>↻</span><span>다시 시작하기</span></button><div class="end-hint">→ 스와이프하면 마지막 카드로 돌아가요</div></div></div>`;}

let cardEl=null;
function renderCard(direction){
  const vp=document.getElementById('viewport');const old=vp.querySelector('.flash-card,.end-card');const isEnd=idx>=cards.length;const el=document.createElement('div');
  if(isEnd){el.className='end-card no-transition';el.innerHTML=buildEndHTML();}
  else{const card=cards[idx];const lineClass=card.type==='blank'?'line-blank':'line-wrong';const{frontHTML,backHTML}=buildCardHTML(card);el.className='flash-card no-transition';el.innerHTML=`<div class="card-face"><div class="card-line ${lineClass}"></div><div class="card-content">${showingBack?backHTML:frontHTML}</div></div>`;}
  if(direction!==0){el.style.transform=`translateX(${direction>0?'100%':'-100%'})`;isAnimating=true;}
  vp.appendChild(el);cardEl=el;
  if(isEnd){const btn=el.querySelector('#restart-btn');if(btn)btn.addEventListener('click',restart);}
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{el.classList.remove('no-transition');el.style.transform='translateX(0)';});});
  if(old){old.classList.remove('no-transition');old.style.transform=`translateX(${direction>0?'-100%':'100%'})`;old.style.opacity='0.3';setTimeout(()=>{if(old.parentNode)old.remove();isAnimating=false;},350);}else{isAnimating=false;}
  updateDots();
}
function restart(){if(isAnimating)return;idx=0;showingBack=false;haptic(15);renderCard(-1);}
function flipCard(el){
  if(!el||isAnimating)return;if(idx>=cards.length)return;if(!el.querySelector('.card-face'))return;
  showingBack=!showingBack;const card=cards[idx];const{frontHTML,backHTML}=buildCardHTML(card);
  const content=el.querySelector('.card-content');const face=el.querySelector('.card-face');
  face.style.transition='transform 0.15s ease';face.style.transform='scale(0.97)';
  setTimeout(()=>{content.innerHTML=showingBack?backHTML:frontHTML;face.style.transform='scale(1)';},80);
  setTimeout(()=>{face.style.transition='';},230);
}
function haptic(ms=8){try{if(window.navigator&&navigator.vibrate)navigator.vibrate(ms);}catch(_){}}

function initInteraction(){
  const vp=document.getElementById('viewport');if(!vp)return;
  let startX=0,startY=0,startTime=0,lastX=0,lastY=0,tracking=false,hasMoved=false,lockedDirection=null,pointerId=null;
  const DIR_LOCK=8,TAP_T=8,SWIPE_D=60,SWIPE_V=30,SWIPE_TIME=350,V_SWIPE=45,V_SWIPE_V=25;
  function getCard(){return vp.querySelector('.flash-card,.end-card');}
  function startTracking(x,y){if(isAnimating)return false;tracking=true;hasMoved=false;lockedDirection=null;startX=x;lastX=x;startY=y;lastY=y;startTime=Date.now();const c=getCard();if(c)c.classList.add('dragging');return true;}
  function moveTracking(x,y,ev){
    if(!tracking)return;const dx=x-startX,dy=y-startY;lastX=x;lastY=y;
    if(lockedDirection===null){if(Math.abs(dx)>DIR_LOCK||Math.abs(dy)>DIR_LOCK)lockedDirection=Math.abs(dx)>Math.abs(dy)*1.1?'h':Math.abs(dy)>Math.abs(dx)*1.1?'v':'h';}
    if(lockedDirection==='h'){if(ev&&ev.cancelable&&ev.type==='touchmove')ev.preventDefault();hasMoved=true;const c=getCard();if(c){let f=0.55;if((dx>0&&idx===0)||(dx<0&&idx>=cards.length))f=0.25;c.style.transform=`translateX(${dx*f}px)`;}const t=Math.min(Math.abs(dx)/70,1);const ip=document.getElementById('ind-prev'),ix=document.getElementById('ind-next');if(dx>5){ip.style.opacity=String(t*0.9);ix.style.opacity='0';}else if(dx<-5){ix.style.opacity=String(t*0.9);ip.style.opacity='0';}else{ip.style.opacity='0';ix.style.opacity='0';}}
    else if(lockedDirection==='v'){if(ev&&ev.cancelable&&ev.type==='touchmove')ev.preventDefault();hasMoved=true;const c=getCard();if(c)c.style.transform=`translateY(${dy*0.25}px)`;const t=Math.min(Math.abs(dy)/50,1);const iu=document.getElementById('ind-up'),id2=document.getElementById('ind-down');if(dy<-5){iu.style.opacity=String(t*0.9);id2.style.opacity='0';}else if(dy>5){id2.style.opacity=String(t*0.9);iu.style.opacity='0';}else{iu.style.opacity='0';id2.style.opacity='0';}}
  }
  function endTracking(endX,endY){
    if(!tracking&&lockedDirection!=='h'&&lockedDirection!=='v'){lockedDirection=null;return;}
    tracking=false;['ind-prev','ind-next','ind-up','ind-down'].forEach(id=>{document.getElementById(id).style.opacity='0';});
    const c=getCard();if(c)c.classList.remove('dragging');const dx=endX-startX,dy=endY-startY,dt=Date.now()-startTime;
    if(lockedDirection==='v'&&hasMoved){const isFastV=dt<SWIPE_TIME&&Math.abs(dy)>V_SWIPE_V,isFarV=Math.abs(dy)>V_SWIPE;if(c)c.style.transform='';if(isFastV||isFarV){if(idx<cards.length){haptic(8);flipCard(c);}}else{if(c){c.style.transition='transform 0.25s cubic-bezier(.4,0,.2,1)';c.style.transform='translateY(0)';setTimeout(()=>{if(c)c.style.transition='';},280);}}lockedDirection=null;return;}
    const wasH=lockedDirection==='h'&&hasMoved,isFast=wasH&&dt<SWIPE_TIME&&Math.abs(dx)>SWIPE_V,isFar=wasH&&Math.abs(dx)>SWIPE_D;
    if(wasH&&(isFast||isFar)){if(c)c.style.transform='';if(dx>0&&idx>0){idx--;showingBack=false;haptic(10);renderCard(-1);}else if(dx<0&&idx<cards.length){idx++;showingBack=false;haptic(10);renderCard(1);}else if(c){c.style.transition='transform 0.3s cubic-bezier(.175,.885,.32,1.275)';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},350);}}
    else{if(c&&wasH){c.style.transition='transform 0.25s cubic-bezier(.4,0,.2,1)';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},280);}else if(c)c.style.transform='';if(lockedDirection===null&&Math.abs(dx)<TAP_T&&Math.abs(dy)<TAP_T)flipCard(c);}
    lockedDirection=null;
  }
  function cancelTracking(){tracking=false;hasMoved=false;lockedDirection=null;const c=getCard();if(c){c.classList.remove('dragging');c.style.transition='transform 0.25s';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},280);}['ind-prev','ind-next','ind-up','ind-down'].forEach(id=>{document.getElementById(id).style.opacity='0';});}
  const supportsPointer=window.PointerEvent!==undefined;
  if(supportsPointer){
    vp.addEventListener('pointerdown',function(e){if(e.pointerType==='mouse'&&e.button!==0)return;if(pointerId!==null)return;if(!startTracking(e.clientX,e.clientY))return;pointerId=e.pointerId;});
    vp.addEventListener('pointermove',function(e){if(e.pointerId!==pointerId)return;moveTracking(e.clientX,e.clientY,e);});
    vp.addEventListener('pointerup',function(e){if(e.pointerId!==pointerId)return;pointerId=null;endTracking(e.clientX,e.clientY);});
    vp.addEventListener('pointercancel',function(e){if(e.pointerId!==pointerId)return;pointerId=null;cancelTracking();});
  }else{
    vp.addEventListener('touchstart',function(e){if(e.touches.length!==1)return;startTracking(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    vp.addEventListener('touchmove',function(e){if(!tracking||e.touches.length!==1)return;moveTracking(e.touches[0].clientX,e.touches[0].clientY,e);},{passive:false});
    vp.addEventListener('touchend',function(e){if(!e.changedTouches||e.changedTouches.length===0)return;endTracking(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:true});
    vp.addEventListener('touchcancel',cancelTracking,{passive:true});
    let mouseDown=false;
    vp.addEventListener('mousedown',function(e){if(!startTracking(e.clientX,e.clientY))return;mouseDown=true;});
    window.addEventListener('mousemove',function(e){if(!mouseDown)return;moveTracking(e.clientX,e.clientY,e);});
    window.addEventListener('mouseup',function(e){if(!mouseDown)return;mouseDown=false;endTracking(e.clientX,e.clientY);});
  }
}
document.addEventListener('keydown',e=>{
  if(isAnimating)return;
  if(e.key==='ArrowRight'&&idx>0){idx--;showingBack=false;renderCard(-1);}
  else if(e.key==='ArrowLeft'&&idx<cards.length){idx++;showingBack=false;renderCard(1);}
  else if(e.key===' '||e.key==='Enter'){e.preventDefault();if(idx>=cards.length){restart();}else if(cardEl){flipCard(cardEl);}}
});
let lastTouchEnd=0;
document.addEventListener('touchend',function(e){const now=Date.now();if(now-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=now;},{passive:false});
function fixVH(){document.documentElement.style.setProperty('--app-vh',`${window.innerHeight*0.01}px`);}
window.addEventListener('resize',fixVH);window.addEventListener('orientationchange',fixVH);fixVH();
buildDots();initInteraction();renderCard(0);
</script>
</body>
</html>
